<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أطباء قسم الداخلية السنة الاولى - مشفى حلب الجامعي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a73e8;
            --secondary: #6c5ce7;
            --accent: #00b894;
            --danger: #e74c3c;
            --warning: #f39c12;
            --success: #27ae60;
            --dark: #2c3e50;
            --white: #ffffff;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-300: #dee2e6;
            --gray-700: #495057;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.08);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 20px rgba(0,0,0,0.1);
            --shadow-xl: 0 20px 30px rgba(0,0,0,0.12);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --transition: all 0.25s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Tajawal', 'Cairo', sans-serif;
            background: linear-gradient(135deg, #e8eaf6 0%, #f3e5f5 50%, #e0f2f1 100%);
            color: var(--dark);
            min-height: 100vh;
        }

        /* خلفية هادئة */
        .bg-pattern {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(118, 75, 162, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(0, 184, 148, 0.06) 0%, transparent 50%);
        }

        /* هيدر */
        .main-header {
            background: linear-gradient(135deg, #1a73e8 0%, #6c5ce7 50%, #00b894 100%);
            padding: 30px 20px; text-align: center; color: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .hospital-logo { font-size: 50px; margin-bottom: 10px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        .main-title .line1 { font-size: 2em; font-weight: 900; display: block; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .main-title .line2 { font-size: 1.6em; font-weight: 800; display: block; margin-top: 5px; color: #ffd700; }
        .hospital-name { font-size: 1.1em; margin-top: 10px; opacity: 0.9; }
        .header-stats { display: flex; justify-content: center; gap: 12px; margin-top: 15px; flex-wrap: wrap; }
        .stat-badge {
            background: rgba(255,255,255,0.2); backdrop-filter: blur(8px); padding: 8px 18px;
            border-radius: 50px; font-size: 13px; border: 1px solid rgba(255,255,255,0.3);
        }

        /* التنقل */
        .main-nav {
            background: white; position: sticky; top: 0; z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 10px;
        }
        .nav-container { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; max-width: 900px; margin: 0 auto; }
        .nav-btn {
            padding: 10px 20px; border: 2px solid #e0e0e0; background: white; border-radius: 50px;
            cursor: pointer; font-family: 'Tajawal', sans-serif; font-size: 14px; font-weight: 600;
            color: #555; transition: var(--transition); display: flex; align-items: center; gap: 6px;
        }
        .nav-btn:hover { border-color: #667eea; color: #667eea; }
        .nav-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-color: transparent; }

        /* المحتوى */
        .main-content { max-width: 1200px; margin: 25px auto; padding: 0 15px; }
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* رأس القسم */
        .section-header {
            background: white; padding: 18px 22px; border-radius: 16px; margin-bottom: 18px;
            box-shadow: var(--shadow-md); display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap; gap: 12px; border-right: 4px solid #667eea;
        }
        .section-header h2 { font-size: 1.3em; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .section-header h2 i { color: #667eea; }

        /* مربع البحث */
        .search-box { position: relative; min-width: 250px; }
        .search-box input {
            width: 100%; padding: 10px 40px 10px 15px; border: 2px solid #e0e0e0; border-radius: 50px;
            font-size: 14px; font-family: 'Tajawal', sans-serif; transition: var(--transition); background: #fafafa;
        }
        .search-box input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); background: white; }
        .search-box i { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #667eea; }

        /* جدول (للكمبيوتر فقط) */
        .desktop-table { display: block; }
        .mobile-cards { display: none; }
        .table-wrapper {
            background: white; border-radius: 16px; box-shadow: var(--shadow-lg); overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; min-width: 700px; font-size: 13px; }
        thead { background: linear-gradient(135deg, #667eea, #764ba2); }
        th { padding: 11px 8px; text-align: center; color: white; font-weight: 700; font-size: 12px; }
        td { padding: 10px 8px; border-bottom: 1px solid #eee; font-size: 12px; text-align: center; }
        td:first-child, th:first-child { text-align: right; }
        tbody tr:hover { background: #f5f7ff; }
        tbody tr:nth-child(even) { background: #fafafa; }

        .status-badge {
            padding: 4px 10px; border-radius: 50px; font-size: 11px; font-weight: 700; display: inline-block;
        }
        .status-joined { background: #d4edda; color: #155724; }
        .status-pending { background: #fff3cd; color: #856404; }

        .copy-btn {
            background: #667eea; color: white; border: none; padding: 3px 8px; border-radius: 12px;
            cursor: pointer; font-size: 10px; margin-right: 4px; transition: var(--transition);
        }
        .copy-btn:hover { background: #764ba2; }
        .copy-btn.copied { background: #28a745; }

        /* بطاقات الموبايل */
        .resident-card, .shift-card {
            background: white; border-radius: 14px; padding: 14px; margin-bottom: 10px;
            box-shadow: var(--shadow-sm); border-right: 3px solid #667eea;
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
        .card-name { font-size: 15px; font-weight: 800; }
        .card-abbr { font-size: 12px; color: #667eea; font-weight: 700; }
        .card-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; }
        .card-label { color: #888; }
        .card-value { font-weight: 600; text-align: left; }

        /* بطاقات الفروز */
        .shifts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
        .shift-card-full {
            background: white; border-radius: 16px; padding: 20px; box-shadow: var(--shadow-md);
            border-top: 4px solid #667eea; transition: var(--transition);
        }
        .shift-card-full:hover { transform: translateY(-3px); box-shadow: var(--shadow-xl); }
        .shift-card-full h3 { color: #667eea; font-size: 1.1em; margin-bottom: 12px; }
        .shift-stats { display: flex; gap: 15px; margin-bottom: 12px; }
        .shift-stat { text-align: center; }
        .shift-stat .num { font-size: 1.8em; font-weight: 900; color: #667eea; }
        .shift-stat .lbl { font-size: 11px; color: #888; }
        .shift-names { font-size: 13px; color: #555; line-height: 1.6; padding-top: 10px; border-top: 1px solid #eee; }

        /* معلوماتي */
        .student-result {
            background: white; border-radius: 16px; padding: 20px; margin-top: 15px;
            box-shadow: var(--shadow-lg); display: none;
        }
        .student-result.show { display: block; animation: fadeIn 0.4s ease; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-top: 15px; }
        .info-item { background: #f8f9fa; padding: 14px; border-radius: 10px; border-right: 3px solid #667eea; }
        .info-item .info-label { font-size: 11px; color: #888; margin-bottom: 4px; }
        .info-item .info-value { font-size: 15px; font-weight: 700; color: #2c3e50; }
        .search-results-list { margin-top: 10px; }
        .search-result-item {
            background: white; padding: 12px 16px; margin-bottom: 6px; border-radius: 10px;
            cursor: pointer; border: 2px solid #eee; transition: var(--transition); display: flex;
            justify-content: space-between; align-items: center;
        }
        .search-result-item:hover { border-color: #667eea; background: #f5f7ff; }
        .search-result-item.selected { border-color: #667eea; background: #eef0ff; }
        .no-results { text-align: center; padding: 30px; color: #e74c3c; }

        /* تحميل سريع */
        .loading-bar {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 3px; z-index: 9999;
            background: linear-gradient(90deg, #667eea, #764ba2, #00b894);
            animation: loadingAnim 0.8s ease infinite;
        }
        @keyframes loadingAnim { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .main-footer { background: #2c3e50; padding: 16px; text-align: center; color: white; margin-top: 40px; font-size: 13px; }

        /* موبايل */
        @media (max-width: 768px) {
            .desktop-table { display: none; }
            .mobile-cards { display: block; }
            .main-title .line1 { font-size: 1.5em; }
            .main-title .line2 { font-size: 1.2em; }
            .nav-btn { padding: 8px 12px; font-size: 12px; }
            .shifts-grid { grid-template-columns: 1fr; }
            .info-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 480px) {
            .info-grid { grid-template-columns: 1fr; }
            .nav-btn span { font-size: 10px; }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="loading-bar" id="loadingBar"></div>

    <header class="main-header">
        <div class="hospital-logo">🏥</div>
        <h1 class="main-title">
            <span class="line1">أطباء قسم الداخلية</span>
            <span class="line2">السنة الاولى</span>
        </h1>
        <p class="hospital-name">مشفى حلب الجامعي</p>
        <div class="header-stats">
            <span class="stat-badge">📅 <span id="currentDateHeader"></span></span>
            <span class="stat-badge">🔄 <span id="lastUpdateTime">تحميل...</span></span>
        </div>
    </header>

    <nav class="main-nav">
        <div class="nav-container">
            <button class="nav-btn active" data-tab="residents">👨‍⚕️ <span>لائحة المقيمين</span></button>
            <button class="nav-btn" data-tab="shifts">📋 <span>جدول الفروز</span></button>
            <button class="nav-btn" data-tab="oncall">📅 <span>جدول المناوبات</span></button>
            <button class="nav-btn" data-tab="myinfo">🔍 <span>معلوماتي</span></button>
        </div>
    </nav>

    <main class="main-content">
        <!-- لائحة المقيمين -->
        <section class="tab-content active" id="residents-tab">
            <div class="section-header">
                <h2>👨‍⚕️ لائحة مقيمي السنة الأولى</h2>
                <div class="search-box">
                    <input type="text" id="residentSearch" placeholder="ابحث بالاسم أو الاختصار...">
                    <i class="fas fa-search"></i>
                </div>
            </div>
            <div class="table-wrapper desktop-table">
                <table><thead><tr><th>الاسم الثلاثي</th><th>الاختصار</th><th>الاختصاص</th><th>الهاتف</th><th>الالتحاق</th><th>المناوبات</th><th>الحالة</th></tr></thead>
                <tbody id="residentsBody"></tbody></table>
            </div>
            <div class="mobile-cards" id="residentsCards"></div>
        </section>

        <!-- جدول الفروز -->
        <section class="tab-content" id="shifts-tab">
            <div class="section-header">
                <h2>📋 جدول فروز <span id="shiftMonthName"></span></h2>
                <div class="search-box">
                    <input type="text" id="shiftSearch" placeholder="ابحث باسم أو فرز...">
                    <i class="fas fa-search"></i>
                </div>
            </div>
            <div class="shifts-grid" id="shiftsGrid"></div>
        </section>

        <!-- جدول المناوبات -->
        <section class="tab-content" id="oncall-tab">
            <div class="section-header">
                <h2>📅 جدول مناوبات <span id="oncallMonthName"></span></h2>
            </div>
            <div class="table-wrapper">
                <table><thead id="oncallHeader"></thead><tbody id="oncallBody"></tbody></table>
            </div>
        </section>

        <!-- معلوماتي -->
        <section class="tab-content" id="myinfo-tab">
            <div class="section-header">
                <h2>🔍 معلوماتي</h2>
                <div class="search-box">
                    <input type="text" id="myInfoSearch" placeholder="اكتب اسمك أو اختصارك...">
                    <i class="fas fa-search"></i>
                </div>
            </div>
            <div id="searchResultsList" class="search-results-list"></div>
            <div id="myInfoResult" class="student-result"></div>
        </section>
    </main>

    <footer class="main-footer">
        <p>© <span id="currentYear"></span> مشفى حلب الجامعي - قسم الداخلية</p>
    </footer>

    <script>
        const SHEET_ID = '1Pb5VK1HsccaJpKXm-jersktd8yk4jf1V7o8qsDDmCI4';
        const ARABIC_MONTHS = ['كانون الثاني','شباط','آذار','نيسان','أيار','حزيران','تموز','آب','أيلول','تشرين الأول','تشرين الثاني','كانون الأول'];
        
        // دالة نسخ
        function copyPhone(phone, btn) {
            navigator.clipboard.writeText(phone).then(() => {
                const icon = btn.querySelector('i');
                const orig = icon.className;
                icon.className = 'fas fa-check';
                btn.classList.add('copied');
                setTimeout(() => { icon.className = orig; btn.classList.remove('copied'); }, 1500);
            });
        }

        class HospitalApp {
            constructor() {
                this.currentMonth = new Date().getMonth();
                this.currentMonthName = ARABIC_MONTHS[this.currentMonth];
                this.allResidents = [];
                this.allShifts = [];
                this.allOncall = [];
                this.allSheetNames = [];
                this.init();
            }

            init() {
                document.getElementById('currentDateHeader').textContent = new Date().toLocaleDateString('ar-SA', {weekday:'long',year:'numeric',month:'long',day:'numeric'});
                document.getElementById('currentYear').textContent = new Date().getFullYear();
                this.setupTabs();
                this.setupSearches();
                this.loadAllData();
                setInterval(() => this.loadAllData(), 120000);
            }

            showLoading(show) {
                document.getElementById('loadingBar').style.display = show ? 'block' : 'none';
            }

            setupTabs() {
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                        btn.classList.add('active');
                        document.getElementById(btn.dataset.tab + '-tab').classList.add('active');
                    });
                });
            }

            setupSearches() {
                document.getElementById('residentSearch').addEventListener('input', e => this.filterResidents(e.target.value));
                document.getElementById('shiftSearch').addEventListener('input', e => this.filterShifts(e.target.value));
                document.getElementById('myInfoSearch').addEventListener('input', e => this.searchMyInfo(e.target.value));
            }

            async fetchSheet(sheetName) {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
                try {
                    const res = await fetch(url);
                    if (!res.ok) return null;
                    const text = await res.text();
                    if (text.includes('<!DOCTYPE') || text.includes('<html')) return null;
                    return this.parseCSV(text);
                } catch(e) { return null; }
            }

            parseCSV(text) {
                const rows = [];
                const lines = text.split('\n');
                for (let line of lines) {
                    if (!line.trim()) continue;
                    const row = []; let inQ = false, val = '';
                    for (let c of line) {
                        if (c === '"') { inQ = !inQ; }
                        else if (c === ',' && !inQ) { row.push(val.trim()); val = ''; }
                        else { val += c; }
                    }
                    row.push(val.trim());
                    rows.push(row);
                }
                return rows;
            }

            identifyType(headers, sampleRow) {
                const h = headers.join(' ').toLowerCase();
                if (h.includes('اسم') && (h.includes('اختصاص') || h.includes('هاتف') || h.includes('التحاق'))) return 'residents';
                if (h.includes('فرز') || (h.includes('أولى') && h.includes('ثانية'))) return 'shifts';
                if (h.includes('مناوب') || h.includes('طبيب')) return 'oncall';
                // try content
                if (sampleRow) {
                    const s = sampleRow.join(' ').toLowerCase();
                    if (s.includes('التحق') || s.includes('ملتحق')) return 'residents';
                }
                return 'unknown';
            }

            async loadAllData() {
                this.showLoading(true);
                try {
                    // Get all sheet names
                    const allNames = [
                        'لائحة مقيمي السنة الاولى', 'لائحة مقيمي السنة الأولى',
                        'جدول فروز شهر تموز', 'جدول فروز شهر ' + this.currentMonthName,
                        'جدول مناوبات تموز', 'جدول مناوبات ' + this.currentMonthName,
                        'Sheet1', 'Sheet2', 'Sheet3', 'ورقة1', 'ورقة2', 'ورقة3'
                    ];
                    
                    let residentsData = null, shiftsData = null, oncallData = null;
                    const allFoundData = [];
                    const foundNames = [];

                    // Try all names
                    for (const name of allNames) {
                        const data = await this.fetchSheet(name);
                        if (data && data.length > 0) {
                            const headers = data[0] || [];
                            const sample = data[1] || null;
                            const type = this.identifyType(headers, sample);
                            console.log(`Found sheet: "${name}" -> type: ${type}`);
                            
                            if (type === 'residents' && !residentsData) residentsData = data;
                            else if (type === 'shifts' && !shiftsData) shiftsData = data;
                            else if (type === 'oncall' && !oncallData) oncallData = data;
                            else if (type === 'unknown') {
                                allFoundData.push(data);
                                foundNames.push(name);
                            }
                        }
                    }

                    // Fallback: use order
                    if (!residentsData && allFoundData.length >= 1) residentsData = allFoundData.shift();
                    if (!shiftsData && allFoundData.length >= 1) shiftsData = allFoundData.shift();
                    if (!oncallData && allFoundData.length >= 1) oncallData = allFoundData.shift();

                    if (residentsData) this.renderResidents(residentsData);
                    if (shiftsData) this.renderShifts(shiftsData);
                    if (oncallData) this.renderOncall(oncallData);

                    if (!residentsData && !shiftsData && !oncallData) {
                        console.log('Using demo data');
                        this.useDemoData();
                    }

                    this.updateTime();
                } catch(e) {
                    console.error(e);
                    this.useDemoData();
                }
                this.showLoading(false);
            }

            renderResidents(data) {
                this.allResidents = [];
                const tbody = document.getElementById('residentsBody');
                const cards = document.getElementById('residentsCards');
                tbody.innerHTML = ''; cards.innerHTML = '';

                for (let i = 1; i < data.length; i++) {
                    const r = data[i];
                    if (!r[1] || !r[1].trim() || r[1].includes('الاسم')) continue;
                    
                    const resident = {
                        name: (r[1]||'').trim(),
                        abbreviation: (r[2]||'').trim(),
                        specialty: (r[3]||'').trim(),
                        phone: (r[4]||'').trim(),
                        joinDate: (r[9]||'').trim(),
                        oncall: (r[10]||'').trim(),
                        status: (r[11]||'').trim()
                    };
                    if (!resident.name) continue;
                    this.allResidents.push(resident);
                    
                    const isJoined = resident.status.includes('التحق') || resident.status.includes('ملتحق');
                    
                    // جدول
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td style="text-align:right;"><strong>${resident.name}</strong></td>
                        <td>${resident.abbreviation}</td><td>${resident.specialty}</td>
                        <td><span dir="ltr">${resident.phone}</span> <button class="copy-btn" onclick="copyPhone('${resident.phone}',this)"><i class="fas fa-copy"></i></button></td>
                        <td>${resident.joinDate||'-'}</td><td>${resident.oncall||'-'}</td>
                        <td><span class="status-badge ${isJoined?'status-joined':'status-pending'}">${resident.status||'غير محدد'}</span></td>`;
                    tbody.appendChild(tr);
                    
                    // بطاقة
                    const card = document.createElement('div');
                    card.className = 'resident-card';
                    card.innerHTML = `<div class="card-header"><span class="card-name">${resident.name}</span><span class="card-abbr">${resident.abbreviation}</span></div>
                        <div class="card-row"><span class="card-label">الاختصاص</span><span class="card-value">${resident.specialty}</span></div>
                        <div class="card-row"><span class="card-label">الهاتف</span><span class="card-value"><span dir="ltr">${resident.phone}</span> <button class="copy-btn" onclick="copyPhone('${resident.phone}',this)"><i class="fas fa-copy"></i></button></span></div>
                        <div class="card-row"><span class="card-label">الالتحاق</span><span class="card-value">${resident.joinDate||'-'}</span></div>
                        <div class="card-row"><span class="card-label">المناوبات</span><span class="card-value">${resident.oncall||'-'}</span></div>
                        <div class="card-row"><span class="card-label">الحالة</span><span class="card-value"><span class="status-badge ${isJoined?'status-joined':'status-pending'}">${resident.status||'غير محدد'}</span></span></div>`;
                    cards.appendChild(card);
                }
            }

            renderShifts(data) {
                this.allShifts = [];
                const grid = document.getElementById('shiftsGrid');
                grid.innerHTML = '';
                document.getElementById('shiftMonthName').textContent = this.currentMonthName;

                for (let i = 1; i < data.length; i++) {
                    const r = data[i];
                    if (!r[1] || !r[1].trim()) continue;
                    const shift = {
                        name: (r[1]||'').trim(),
                        firstCount: (r[2]||'0').trim(),
                        secondCount: (r[3]||'0').trim(),
                        names: (r[4]||'').trim()
                    };
                    if (!shift.name) continue;
                    this.allShifts.push(shift);
                }

                this.displayShifts(this.allShifts);
            }

            displayShifts(shifts) {
                const grid = document.getElementById('shiftsGrid');
                grid.innerHTML = '';
                shifts.forEach(shift => {
                    const card = document.createElement('div');
                    card.className = 'shift-card-full';
                    card.innerHTML = `
                        <h3>📋 ${shift.name}</h3>
                        <div class="shift-stats">
                            <div class="shift-stat"><div class="num">${shift.firstCount}</div><div class="lbl">عدد الأولى</div></div>
                            <div class="shift-stat"><div class="num">${shift.secondCount}</div><div class="lbl">عدد الثانية</div></div>
                        </div>
                        <div class="shift-names"><strong>الأسماء:</strong> ${shift.names || 'لا يوجد'}</div>`;
                    grid.appendChild(card);
                });
            }

            filterShifts(term) {
                const t = term.toLowerCase().trim();
                if (!t) { this.displayShifts(this.allShifts); return; }
                const filtered = this.allShifts.filter(s => 
                    s.name.toLowerCase().includes(t) || s.names.toLowerCase().includes(t)
                );
                this.displayShifts(filtered);
            }

            renderOncall(data) {
                this.allOncall = [];
                const thead = document.getElementById('oncallHeader');
                const tbody = document.getElementById('oncallBody');
                document.getElementById('oncallMonthName').textContent = this.currentMonthName;

                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:40px;">⚠️ لا توجد بيانات للمناوبات حالياً. يرجى التأكد من الورقة الثالثة.</td></tr>';
                    return;
                }

                const headers = data[0];
                thead.innerHTML = '<tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr>';
                tbody.innerHTML = '';

                for (let i = 1; i < data.length; i++) {
                    const row = data[i];
                    if (row.some(c => c && c.trim())) {
                        this.allOncall.push(row);
                        const tr = document.createElement('tr');
                        tr.innerHTML = row.map(c => `<td>${c||'-'}</td>`).join('');
                        tbody.appendChild(tr);
                    }
                }
            }

            filterResidents(term) {
                const t = term.toLowerCase().trim();
                const rows = document.querySelectorAll('#residentsBody tr');
                const cards = document.querySelectorAll('#residentsCards .resident-card');
                
                this.allResidents.forEach((r, i) => {
                    const match = !t || r.name.toLowerCase().includes(t) || r.abbreviation.toLowerCase().includes(t);
                    if (rows[i]) rows[i].style.display = match ? '' : 'none';
                    if (cards[i]) cards[i].style.display = match ? '' : 'none';
                });
            }

            searchMyInfo(term) {
                const t = term.toLowerCase().trim();
                const resultsList = document.getElementById('searchResultsList');
                const resultDiv = document.getElementById('myInfoResult');
                
                if (t.length < 1) {
                    resultsList.innerHTML = '';
                    resultDiv.classList.remove('show');
                    return;
                }

                // بحث متقدم: تطابق كامل، ثم جزئي، ثم كلمات منفصلة
                let matches = this.allResidents.filter(r => 
                    r.name.toLowerCase() === t || r.abbreviation.toLowerCase() === t
                );
                
                if (matches.length === 0) {
                    matches = this.allResidents.filter(r => 
                        r.name.toLowerCase().includes(t) || r.abbreviation.toLowerCase().includes(t)
                    );
                }
                
                // بحث بالكلمات
                if (matches.length === 0) {
                    const words = t.split(/[\s,.]+/).filter(w => w.length > 1);
                    matches = this.allResidents.filter(r => {
                        const nameWords = r.name.toLowerCase().split(/\s+/);
                        const abbr = r.abbreviation.toLowerCase().replace(/[.\s]/g, '');
                        return words.some(w => nameWords.some(nw => nw.includes(w)) || abbr.includes(w));
                    });
                }

                if (matches.length === 0) {
                    resultsList.innerHTML = '<div class="no-results">🔍 لا يوجد نتائج مطابقة. تأكد من كتابة الاسم بشكل صحيح.</div>';
                    resultDiv.classList.remove('show');
                    return;
                }

                if (matches.length === 1) {
                    resultsList.innerHTML = '';
                    this.showMyInfo(matches[0]);
                } else {
                    // عرض قائمة للاختيار
                    resultsList.innerHTML = matches.map((m, i) => `
                        <div class="search-result-item" data-index="${i}" onclick="app.selectMyInfo(${i})">
                            <span><strong>${m.name}</strong> (${m.abbreviation})</span>
                            <span style="color:#667eea;">${m.specialty}</span>
                        </div>
                    `).join('');
                    resultDiv.classList.remove('show');
                    // تخزين النتائج مؤقتاً
                    this._searchMatches = matches;
                }
            }

            selectMyInfo(index) {
                const resident = this._searchMatches[index];
                if (resident) {
                    document.getElementById('searchResultsList').innerHTML = '';
                    this.showMyInfo(resident);
                }
            }

            showMyInfo(resident) {
                const resultDiv = document.getElementById('myInfoResult');
                const isJoined = resident.status.includes('التحق') || resident.status.includes('ملتحق');

                // البحث في الفروز
                let shiftFound = null;
                for (let s of this.allShifts) {
                    if (s.names.toLowerCase().includes(resident.name.toLowerCase()) ||
                        (resident.abbreviation && s.names.toLowerCase().includes(resident.abbreviation.toLowerCase()))) {
                        shiftFound = s;
                        break;
                    }
                }

                // البحث في المناوبات
                let oncallRows = [];
                for (let row of this.allOncall) {
                    const rt = row.join(' ').toLowerCase();
                    if (rt.includes(resident.name.toLowerCase()) ||
                        (resident.abbreviation && rt.includes(resident.abbreviation.toLowerCase()))) {
                        oncallRows.push(row);
                    }
                }

                let html = `<h3 style="color:#667eea;margin-bottom:15px;">👤 ${resident.name}</h3>`;
                html += '<div class="info-grid">';
                html += `<div class="info-item"><div class="info-label">الاختصار</div><div class="info-value">${resident.abbreviation}</div></div>`;
                html += `<div class="info-item"><div class="info-label">الاختصاص</div><div class="info-value">${resident.specialty}</div></div>`;
                html += `<div class="info-item"><div class="info-label">الهاتف</div><div class="info-value"><span dir="ltr">${resident.phone}</span> <button class="copy-btn" onclick="copyPhone('${resident.phone}',this)"><i class="fas fa-copy"></i></button></div></div>`;
                html += `<div class="info-item"><div class="info-label">تاريخ الالتحاق</div><div class="info-value">${resident.joinDate||'غير محدد'}</div></div>`;
                html += `<div class="info-item"><div class="info-label">الحالة</div><div class="info-value"><span class="status-badge ${isJoined?'status-joined':'status-pending'}">${resident.status||'غير محدد'}</span></div></div>`;
                html += `<div class="info-item"><div class="info-label">عدد المناوبات الكلي</div><div class="info-value">${resident.oncall||'0'}</div></div>`;
                html += '</div>';

                // الفرز
                html += '<div style="margin-top:20px;"><h4 style="color:#667eea;">📋 الفرز</h4>';
                if (shiftFound) {
                    html += `<div class="shift-card-full" style="margin-top:8px;">
                        <h3>${shiftFound.name}</h3>
                        <div class="shift-stats">
                            <div class="shift-stat"><div class="num">${shiftFound.firstCount}</div><div class="lbl">عدد الأولى</div></div>
                            <div class="shift-stat"><div class="num">${shiftFound.secondCount}</div><div class="lbl">عدد الثانية</div></div>
                        </div>
                        <div class="shift-names"><strong>الزملاء في نفس الفرز:</strong> ${shiftFound.names}</div>
                    </div>`;
                } else {
                    html += '<p style="color:#888;">لم يتم العثور على فرز لهذا الشهر.</p>';
                }
                html += '</div>';

                // المناوبات
                html += '<div style="margin-top:20px;"><h4 style="color:#667eea;">📅 مناوبات هذا الشهر</h4>';
                if (oncallRows.length > 0) {
                    html += `<p style="margin-bottom:10px;">عدد المناوبات هذا الشهر: <strong>${oncallRows.length}</strong></p>`;
                    html += '<div class="table-wrapper" style="margin-top:8px;"><table><thead><tr>';
                    const headers = document.querySelectorAll('#oncallHeader th');
                    if (headers.length > 0) {
                        headers.forEach(th => html += `<th>${th.textContent}</th>`);
                    } else {
                        html += '<th>اليوم</th><th>التاريخ</th><th>الطبيب</th><th>الاحتياط</th>';
                    }
                    html += '</tr></thead><tbody>';
                    oncallRows.forEach(row => {
                        html += '<tr>' + row.map(c => `<td>${c||'-'}</td>`).join('') + '</tr>';
                    });
                    html += '</tbody></table></div>';
                } else {
                    html += '<p style="color:#888;">لا توجد مناوبات مسجلة هذا الشهر.</p>';
                }
                html += '</div>';

                resultDiv.innerHTML = html;
                resultDiv.classList.add('show');
                document.getElementById('searchResultsList').innerHTML = '';
            }

            useDemoData() {
                this.renderResidents([
                    ['','الاسم الثلاثي','الاختصار','الاختصاص','الهاتف','','','','','تاريخ الالتحاق','المناوبات','الحالة'],
                    ['','أحمد محمد علي','أ.م.ع','الباطنة','0991234567','','','','','2023-10-01','15','ملتحق'],
                    ['','فاطمة خالد حسن','ف.خ.ح','القلبية','0992345678','','','','','2023-10-01','12','ملتحق'],
                    ['','عمر محمود سعيد','ع.م.س','الصدرية','0993456789','','','','','2023-11-15','10','ملتحق'],
                    ['','سارة يوسف إبراهيم','س.ي.إ','الهضمية','0994567890','','','','','','8','لم يلتحق بعد'],
                    ['','خالد عبد الله','خ.ع.ا','الباطنة','0995678901','','','','','2024-01-05','5','ملتحق'],
                ]);
                this.renderShifts([
                    ['','الفرز','عدد الأولى','عدد الثانية','الأسماء'],
                    ['','الفرز الأول','10','5','أحمد محمد علي، فاطمة خالد حسن، عمر محمود سعيد'],
                    ['','الفرز الثاني','8','7','سارة يوسف إبراهيم، خالد عبد الله'],
                ]);
                this.renderOncall([
                    ['اليوم','التاريخ','الطبيب المناوب','الطبيب الاحتياط'],
                    ['السبت','2024-07-01','أحمد محمد علي','فاطمة خالد حسن'],
                    ['الأحد','2024-07-02','عمر محمود سعيد','سارة يوسف إبراهيم'],
                    ['الاثنين','2024-07-03','خالد عبد الله','أحمد محمد علي'],
                    ['الثلاثاء','2024-07-04','أحمد محمد علي','عمر محمود سعيد'],
                ]);
                this.updateTime();
            }

            updateTime() {
                document.getElementById('lastUpdateTime').textContent = 'آخر تحديث: ' + new Date().toLocaleTimeString('ar-SA');
            }
        }

        let app;
        document.addEventListener('DOMContentLoaded', () => {
            app = new HospitalApp();
            window.app = app; // للوصول من onclick
        });
    </script>
</body>
</html>
