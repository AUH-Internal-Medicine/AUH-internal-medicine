:root{--primary:#1a73e8;--secondary:#6c5ce7;--accent:#00b894;--danger:#e74c3c;--warning:#f39c12;--success:#27ae60;--dark:#1a1a2e;--white:#ffffff;--gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;--gray-500:#64748b;--gray-800:#1e293b;--bg:#f0f4ff;--card-bg:#ffffff;--text:#1e293b;--text-secondary:#64748b;--border:#e2e8f0;--shadow:0 4px 6px rgba(0,0,0,0.07);--shadow-md:0 8px 15px rgba(0,0,0,0.1);--shadow-lg:0 15px 30px rgba(0,0,0,0.12);--shadow-xl:0 25px 50px rgba(0,0,0,0.15);--glass-bg:rgba(255,255,255,0.25);--glass-border:rgba(255,255,255,0.4);--header-bg:linear-gradient(135deg,#1a73e8 0%,#6c5ce7 50%,#00b894 100%);--header-text:#ffffff;--header-gold:#ffd700;--header-image:url('bg.webp');--weekend-color:#e74c3c;--radius:16px;--radius-lg:20px;--radius-full:50px;--transition:all 0.3s cubic-bezier(0.4,0,0.2,1);--transition-fast:all 0.2s ease}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:var(--transition);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
.animated-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;background:linear-gradient(135deg,#e8eaf6,#f3e5f5,#e0f2f1,#e8eaf6);background-size:400% 400%;animation:bgMove 15s ease infinite}
@keyframes bgMove{0%,100%{background-position:0% 50%}50%{background-position:100% 100%}}
.bg-dots{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;background-image:radial-gradient(circle,rgba(102,126,234,0.06) 1px,transparent 1px);background-size:25px 25px}
.bg-orb{position:fixed;border-radius:50%;filter:blur(100px);opacity:0.35;z-index:-1;pointer-events:none;animation:orbFloat 25s infinite ease-in-out}
.bg-orb-1{width:350px;height:350px;background:#667eea;top:-100px;right:-50px}
.bg-orb-2{width:250px;height:250px;background:#f093fb;bottom:-80px;left:-30px;animation-delay:-8s}
.bg-orb-3{width:280px;height:280px;background:#00b894;top:50%;left:60%;animation-delay:-16s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-50px,-80px) scale(1.1)}}
.header-bg-image{pointer-events:none;user-select:none}
.loading-screen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10000;background:linear-gradient(135deg,#667eea,#764ba2,#00b894);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.4s,visibility 0.4s}
.loading-screen.hidden{opacity:0;visibility:hidden;pointer-events:none}
.loader-title{font-size:2em;font-weight:900;margin-bottom:25px;color:white}
.progress-bar-container{width:280px;height:8px;background:rgba(255,255,255,0.3);border-radius:50px;overflow:hidden;margin:0 auto 12px}
.progress-bar{height:100%;background:linear-gradient(90deg,#ffd700,#ffed4a,#ffd700);background-size:200% 100%;border-radius:50px;transition:width 0.3s;width:0%;animation:shimmer 2s infinite}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.loader-percentage{font-size:2.5em;font-weight:900;color:#ffd700}
.loader-subtitle{font-size:0.9em;color:rgba(255,255,255,0.9);margin-top:4px;font-weight:500}
.download-progress-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:99999;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center}
.download-progress-overlay.hidden{display:none}
.download-progress-box{background:var(--card-bg);padding:25px 35px;border-radius:var(--radius-lg);text-align:center;border:3px solid #667eea;box-shadow:0 20px 60px rgba(0,0,0,0.5);min-width:280px;max-width:90vw}
.dp-title{font-size:1.1em;font-weight:700;color:#667eea;margin-bottom:14px}
.dp-bar-container{width:100%;height:10px;background:var(--gray-200);border-radius:50px;overflow:hidden;margin-bottom:8px}
.dp-bar{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:50px;transition:width 0.3s;width:0%}
.dp-percent{font-size:2em;font-weight:900;color:#667eea}
.dp-sub{font-size:0.85em;color:var(--text-secondary);margin-top:4px}
.main-header{background:var(--header-bg);padding:35px 20px;text-align:center;color:var(--header-text);box-shadow:0 15px 50px rgba(0,0,0,0.25);position:relative;overflow:hidden}
.main-header::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 18% 22%,rgba(255,255,255,0.22),transparent 42%),radial-gradient(circle at 84% 78%,rgba(255,255,255,0.14),transparent 40%);pointer-events:none;z-index:0}
.header-bg-image{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;overflow:hidden;background:linear-gradient(135deg,rgba(26,115,232,0.35),rgba(0,184,148,0.25));transition:opacity 0.5s ease,transform 0.5s ease}
.header-bg-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 22%;opacity:0.62;transform:scale(1);filter:saturate(1.12) contrast(1.06) brightness(1.02);transition:opacity 0.5s ease,filter 0.5s ease}
body.dark-mode .header-bg-photo{opacity:0.72;filter:saturate(1.06) contrast(1.08) brightness(1.02)}
.header-content{position:relative;z-index:1}
.header-top-row{display:flex;justify-content:flex-end;max-width:1300px;margin:0 auto 10px;position:relative;z-index:2}
.dark-mode-toggle{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);color:var(--header-text);padding:10px 18px;border-radius:var(--radius-full);cursor:pointer;font-size:18px;transition:var(--transition);backdrop-filter:blur(10px)}
.dark-mode-toggle:hover{background:rgba(255,255,255,0.35);transform:scale(1.05) rotate(15deg)}
.title-line1{font-size:2.5em;font-weight:900;display:block;letter-spacing:1px;text-shadow:2px 2px 8px rgba(0,0,0,0.3)}
.title-line2{font-size:1.8em;font-weight:800;display:block;margin-top:8px;color:var(--header-gold);text-shadow:0 0 30px rgba(255,215,0,0.3)}
.hospital-name{font-size:1.3em;margin-top:15px;opacity:0.95;font-weight:500}
.header-stats{display:flex;justify-content:center;gap:14px;margin-top:20px;flex-wrap:wrap}
.stat-badge{background:rgba(255,255,255,0.2);backdrop-filter:blur(10px);padding:10px 22px;border-radius:var(--radius-full);font-size:14px;border:1px solid rgba(255,255,255,0.3);transition:var(--transition)}
.stat-badge:hover{background:rgba(255,255,255,0.35);transform:translateY(-3px)}
.main-nav{background:rgba(255,255,255,0.85);backdrop-filter:blur(20px);position:sticky;top:0;z-index:200;box-shadow:0 5px 30px rgba(0,0,0,0.1);padding:10px;border-bottom:2px solid rgba(102,126,234,0.1)}
.nav-container{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;max-width:1200px;margin:0 auto}
.nav-btn{padding:9px 16px;border:2px solid var(--border);background:var(--card-bg);border-radius:var(--radius-full);cursor:pointer;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;color:var(--text);transition:var(--transition-fast);display:flex;align-items:center;gap:5px;white-space:nowrap}
.nav-btn i{font-size:13px;width:16px;text-align:center}
.nav-btn:hover{border-color:#667eea;color:#667eea;transform:translateY(-2px)}
.nav-btn.active{background:linear-gradient(135deg,#667eea,#764ba2);color:white;border-color:transparent;box-shadow:0 8px 25px rgba(102,126,234,0.4)}
.main-content{max-width:1300px;margin:25px auto;padding:0 15px;flex:1 0 auto;width:100%}
.tab-content{display:none;animation:fadeSlideIn 0.4s ease}
.tab-content.active{display:block}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
.section-header{background:var(--card-bg);padding:18px 22px;border-radius:var(--radius-lg);margin-bottom:16px;box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;border-right:5px solid #667eea;background:var(--glass-bg);border:1px solid var(--glass-border)}
.section-header h2{font-size:1.4em;font-weight:800;display:flex;align-items:center;gap:10px;color:var(--text)}
.section-header h2 i{color:#667eea;font-size:24px;background:linear-gradient(135deg,#667eea15,#764ba215);padding:9px;border-radius:12px}
.controls-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.search-box{position:relative;min-width:240px}
.search-box input{width:100%;padding:11px 42px 11px 14px;border:2px solid var(--border);border-radius:var(--radius-full);font-size:13px;font-family:'Tajawal',sans-serif;background:var(--gray-100);color:var(--text);transition:var(--transition)}
.search-box input:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 4px rgba(102,126,234,0.15);background:var(--card-bg)}
.search-box i{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#667eea;font-size:16px;pointer-events:none}
.filter-btn{padding:10px 18px;border:2px solid var(--border);background:var(--card-bg);border-radius:var(--radius-full);cursor:pointer;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;color:var(--text);transition:var(--transition);display:flex;align-items:center;gap:5px;white-space:nowrap}
.filter-btn:hover{border-color:#667eea;color:#667eea}
.filter-btn.active-filter{background:#667eea;color:white;border-color:#667eea}
.specialty-filter,.shift-filter{padding:10px 18px;border:2px solid var(--border);background:var(--card-bg);border-radius:var(--radius-full);cursor:pointer;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:600;color:var(--text);min-width:160px;transition:var(--transition)}
.specialty-filter:hover,.shift-filter:hover{border-color:#667eea}
.contacts-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:10px 0}
.contacts-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;background:linear-gradient(135deg,#00b894,#00a381);color:white;border:none;border-radius:var(--radius-full);cursor:pointer;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;transition:var(--transition);white-space:nowrap;box-shadow:0 5px 15px rgba(0,184,148,0.2)}
.contacts-btn:hover{transform:translateY(-3px);box-shadow:0 10px 25px rgba(0,184,148,0.4)}
.contacts-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.select-all-btn{padding:8px 14px;background:var(--gray-100);border:2px solid var(--border);border-radius:var(--radius-full);cursor:pointer;font-family:'Tajawal',sans-serif;font-size:11px;font-weight:600;color:var(--text);transition:var(--transition);white-space:nowrap}
.select-all-btn:hover{border-color:#667eea;color:#667eea}
.contact-checkbox{width:17px;height:17px;cursor:pointer;accent-color:#667eea}
.selected-count{font-size:12px;color:var(--text-secondary);font-weight:600;background:var(--gray-100);padding:5px 12px;border-radius:var(--radius-full)}
.percentage-badge{font-size:12px;font-weight:700;background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:5px 12px;border-radius:var(--radius-full)}
.desktop-table{display:block}.mobile-cards{display:none}
.table-wrapper{background:var(--card-bg);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);overflow-x:auto;border:1px solid var(--border);-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:850px;font-size:12px}
thead{background:linear-gradient(135deg,#667eea,#764ba2)}
th{padding:12px 8px;text-align:center;color:white;font-weight:700;font-size:10px;white-space:nowrap}
td{padding:10px 8px;border-bottom:1px solid var(--border);font-size:11px;text-align:center;color:var(--text)}
td:first-child,th:first-child{text-align:right}
tbody tr:hover{background:linear-gradient(90deg,rgba(102,126,234,0.08),rgba(118,75,162,0.08))}
tbody tr:nth-child(even){background:rgba(102,126,234,0.02)}
.seq-cell{font-weight:700;color:#667eea;font-size:12px;width:35px}
.seq-badge{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;background:linear-gradient(135deg,rgba(102,126,234,0.15),rgba(118,75,162,0.15));color:#667eea;border-radius:50%;font-size:12px;font-weight:700;margin-left:8px;border:1px solid rgba(102,126,234,0.2)}
.status-badge{padding:6px 16px;border-radius:var(--radius-full);font-size:10px;font-weight:700;display:inline-flex;align-items:center;gap:4px}
.status-joined{background:linear-gradient(135deg,#d4edda,#c3e6cb);color:#155724;border:1px solid #b1dfbb}
.status-pending{background:linear-gradient(135deg,#ffd6db,#ffb8c1);color:#8a1f2d;border:1px solid #e74c3c}
.status-not-joined{background:linear-gradient(135deg,#ffd6db,#ffb8c1);color:#8a1f2d;border:1px solid #e74c3c}
.status-not-yet{background:linear-gradient(135deg,#fff3cd,#ffeaa7);color:#856404;border:1px solid #ffc107}
.copy-btn{background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;padding:4px 10px;border-radius:var(--radius-full);cursor:pointer;font-size:9px;margin-right:4px;font-family:'Tajawal',sans-serif}
.copy-btn:hover{transform:scale(1.15)}
.copy-btn.copied{background:#28a745}
.count-badge{background:rgba(102,126,234,0.1);color:#667eea;padding:5px 12px;border-radius:var(--radius-full);font-size:12px;font-weight:700;border:1px solid rgba(102,126,234,0.2)}
.resident-card{background:var(--card-bg);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);border-right:4px solid #667eea;background:var(--glass-bg);border:1px solid var(--glass-border)}
.resident-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.card-name{font-size:16px;font-weight:800;color:var(--text)}.card-abbr{font-size:11px;color:#667eea;font-weight:700;background:rgba(102,126,234,0.1);padding:4px 10px;border-radius:var(--radius-full)}
.card-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px}
.card-label{color:var(--text-secondary)}.card-value{font-weight:600;text-align:left;color:var(--text)}
.shifts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.shift-card-full{background:var(--card-bg);border-radius:var(--radius-lg);padding:22px;box-shadow:var(--shadow);border-top:5px solid #667eea;background:var(--glass-bg);border:1px solid var(--glass-border);position:relative;transition:var(--transition)}
.shift-card-full:hover{transform:translateY(-4px);box-shadow:var(--shadow-xl)}
.shift-card-full h3{color:#667eea;font-size:1.1em;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.shift-stats{display:flex;gap:16px;margin-bottom:14px}
.shift-stat{text-align:center;flex:1;background:var(--gray-100);padding:12px;border-radius:var(--radius);transition:var(--transition-fast)}
.shift-stat:hover{background:rgba(102,126,234,0.1)}
.shift-stat .num{font-size:1.8em;font-weight:900;color:#667eea}
.shift-stat .lbl{font-size:10px;color:var(--text-secondary);margin-top:3px}
.name-clickable{position:relative;cursor:pointer;display:inline-block;padding:4px 10px;border-radius:8px;transition:var(--transition-fast)}
.name-clickable:hover{background:rgba(102,126,234,0.15)}
.name-tooltip{display:none;position:fixed;z-index:99999;background:var(--card-bg);color:var(--text);padding:14px 18px;border-radius:14px;border:2px solid #667eea;box-shadow:0 15px 40px rgba(0,0,0,0.3);font-size:13px;min-width:200px;text-align:center;pointer-events:auto}
.name-tooltip.show{display:block;animation:tooltipPop 0.2s ease}
@keyframes tooltipPop{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
.tt-name{font-weight:700;color:#667eea;margin-bottom:8px;font-size:14px}

downloadMyInfoImage(){const el=document.getElementById('myInfoContent');if(!el)return;const btn=el.querySelector('.download-btn');const bg=document.body.classList.contains('dark-mode')?'#1e293b':'#ffffff';this._captureImage(el,`${this.currentMyInfo?.name||'معلوماتي'}.png`,bg,btn)}
renderMonthlyCalendar(){const container=document.getElementById('monthlyCalendar');if(!container)return;const yr=parseInt(this.today.split('-')[0]);const mo=this.currentDisplayMonth;const dim=new Date(yr,mo+1,0).getDate();const fd=new Date(yr,mo,1).getDay();const afd=fd===0?6:fd-1;const dns=['اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت','أحد'];const tn=parseInt(this.today.split('-')[2]);const tm=parseInt(this.today.split('-')[1])-1;let h=`<div class="monthly-calendar"><div class="calendar-header"><h3><i class="fas fa-calendar-days"></i> ${AM[mo]} ${yr}</h3></div><div class="calendar-grid">`;dns.forEach((d,i)=>{h+=`<div class="calendar-day-header${i===4||i===5?' weekend':''}">${d}</div>`});for(let i=0;i<afd;i++)h+='<div class="calendar-day empty"></div>';for(let day=1;day<=dim;day++){const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;const d=new Date(yr,mo,day);const di=d.getDay();const it=day===tn&&mo===tm;const pa=ds<this.today;let cls='calendar-day';if(it)cls+=' today';if(pa&&!it)cls+=' past-day';if(di===5||di===6)cls+=' weekend';h+=`<div class="${cls}" onclick="app.clickCalendarDay('${ds}')">${day}</div>`}h+='</div></div>';container.innerHTML=h}
clickCalendarDay(ds){document.getElementById('oncallDatePicker').value=ds;this.selectDayFromCalendar()}
searchMe(term){const t=term.toLowerCase().trim();const rl=document.getElementById('searchResultsList');const rd=document.getElementById('myInfoResult');if(t.length<1){rl.innerHTML='';rd.classList.remove('show');return}const mt=this.res.filter(r=>smartSearch(r.name+' '+r.abbr,t));if(!mt.length){rl.innerHTML='<div class="no-results"><i class="fas fa-magnifying-glass"></i> لا يوجد نتائج مطابقة.</div>';rd.classList.remove('show');return}if(mt.length===1){rl.innerHTML='';this.showMe(mt[0])}else{this._sm=mt;rl.innerHTML=mt.map((m,i)=>`<div class="search-result-item" onclick="app.selectMe(${i})"><span><strong>${m.name}</strong> (${m.abbr})</span><span style="color:#667eea;">${m.spec}</span></div>`).join('');rd.classList.remove('show')}}
selectMe(i){if(this._sm&&this._sm[i]){document.getElementById('searchResultsList').innerHTML='';this.showMe(this._sm[i])}}
getEvalForResident(name,abbr){if(!this.evalData||this.evalData.length<4)return null;const headers=this.evalData[0]||[];for(let i=3;i<this.evalData.length;i++){const row=this.evalData[i];if(!row||!row.length)continue;const rn=(row[1]||'').trim(),ra=(row[2]||'').trim();if(smartSearch(rn,name)||smartSearch(ra,abbr)||ra===abbr){return{name:rn,abbr:ra,spec:row[3]||'-',skills:[{label:headers[4]||'المهارات السريرية',value:row[4]||'-'},{label:headers[5]||'المعرفة الطبية',value:row[5]||'-'},{label:headers[6]||'اتخاذ القرار',value:row[6]||'-'},{label:headers[7]||'المهارات الاجرائية',value:row[7]||'-'},{label:headers[8]||'العمل ضمن فريق',value:row[8]||'-'},{label:headers[9]||'المهنية والانضباط',value:row[9]||'-'},{label:headers[10]||'التواصل مع المرضى',value:row[10]||'-'},{label:headers[11]||'النشاطات الاكاديمية',value:row[11]||'-'}],total:row[12]||'-',praise:row[13]||'',penalty:row[14]||''}}}return null}
showMe(r){const rd=document.getElementById('myInfoResult');if(!rd)return;const ok=isJoined(r.st);this.currentMyInfo=r;
let myo=[];const tc={};for(const onc of this.oncRows){for(let col=2;col<this.oncHeaders.length;col++){const cc=(onc.row[col]||'').trim();if(!cc)continue;const names=splitNames(cc);if(!names.length)continue;const found=names.some(n=>exactNameMatch(n,r.abbr)||exactNameMatch(n,r.name));if(found){const cn=this.oncHeaders[col]||'أخرى';tc[cn]=(tc[cn]||0)+1;const colleagues=[];for(const n of names){if(!exactNameMatch(n,r.abbr)&&!exactNameMatch(n,r.name)){const cr=this.findRbyExact(n);if(cr)colleagues.push({name:cr.name,abbr:cr.abbr,phone:cr.phone});else colleagues.push({name:n,abbr:n,phone:''})}}myo.push({date:onc.date,day:onc.day||getDayName(onc.date),dayIdx:getDayIndex(onc.date),cat:cn,colleagues})}}}myo.sort((a,b)=>a.date.localeCompare(b.date));const tot=myo.length;const now=new Date();const ts=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;const evalInfo=this.getEvalForResident(r.name,r.abbr);
let h=`<div id="myInfoContent" style="padding:8px;"><h3 style="color:#667eea;text-align:center;font-size:1.4em;margin-bottom:14px;"><i class="fas fa-user"></i> ${r.name} (${r.abbr}) <span style="font-size:0.6em;color:var(--text-secondary);">#${r.seq}</span></h3><div class="cumulative-box"><div class="cum-num">${r.cumulativeOnc||'0'}</div><div class="cum-lbl">إجمالي المناوبات التراكمية</div></div>`;
h+=`<div class="collapsible-section"><button class="collapsible-btn" onclick="toggleCollapsible(this)"><span><i class="fas fa-circle-info"></i> معلومات إضافية</span><i class="fas fa-chevron-down"></i></button><div class="collapsible-content"><div class="info-grid"><div class="info-item"><div class="info-label">الرقم التسلسلي</div><div class="info-value">${r.seq}</div></div><div class="info-item"><div class="info-label">الاختصاص</div><div class="info-value">${r.spec}</div></div><div class="info-item"><div class="info-label">الهاتف</div><div class="info-value"><span dir="ltr">${r.phone}</span> <button class="copy-btn" onclick="copyPhone('${r.phone}',this)"><i class="fas fa-copy"></i></button></div></div><div class="info-item"><div class="info-label">الالتحاق</div><div class="info-value">${r.join||'-'}</div></div><div class="info-item"><div class="info-label">الحالة</div><div class="info-value"><span class="status-badge ${ok?'status-joined':getStatusBadgeClass(r.st)}">${ok?'<i class="fas fa-circle-check"></i>':'<i class="fas fa-hourglass-half"></i>'} ${r.st||'غير محدد'}</span></div></div><div class="info-item"><div class="info-label">المناوبات الكلية</div><div class="info-value">${r.onc||'0'}</div></div></div></div></div>`;
if(evalInfo){h+=`<div class="collapsible-section"><button class="collapsible-btn" onclick="toggleCollapsible(this)"><span><i class="fas fa-chart-line"></i> التقييم السنوي</span><i class="fas fa-chevron-down"></i></button><div class="collapsible-content"><div class="info-grid">`;for(const skill of evalInfo.skills)h+=`<div class="info-item"><div class="info-label">${skill.label}</div><div class="info-value">${skill.value}</div></div>`;h+=`</div>`;if(evalInfo.praise&&evalInfo.praise.trim())h+=`<div style="margin-top:10px;padding:10px 14px;background:rgba(39,174,96,0.08);border-radius:10px;border-right:4px solid #27ae60;"><strong style="color:#27ae60;"><i class="fas fa-star"></i> الثناءات:</strong><br><span style="font-weight:600;color:#27ae60;">${evalInfo.praise}</span></div>`;if(evalInfo.penalty&&evalInfo.penalty.trim())h+=`<div style="margin-top:6px;padding:10px 14px;background:rgba(231,76,60,0.08);border-radius:10px;border-right:4px solid #e74c3c;"><strong style="color:#e74c3c;"><i class="fas fa-triangle-exclamation"></i> العقوبات:</strong><br><span style="font-weight:600;color:#e74c3c;">${evalInfo.penalty}</span></div>`;h+=`<div class="stat-card" style="margin-top:10px;"><div class="stat-num">${evalInfo.total}</div><div class="stat-lbl">المحصلة الاجمالية</div></div></div></div>`;}
const allMonths=this.getAllShiftMonths();const cm=this.getPreferredShiftMonth();h+=`<div class="collapsible-section"><button class="collapsible-btn open" onclick="toggleCollapsible(this)"><span><i class="fas fa-clipboard-list"></i> الفرز</span><i class="fas fa-chevron-down"></i></button><div class="collapsible-content show">`;if(allMonths.length>0){h+=`<div style="margin-bottom:12px;"><select class="month-selector" id="myInfoShiftMonth" onchange="app.updateMyInfoShift('${r.name.replace(/'/g,"\\'")}','${r.abbr.replace(/'/g,"\\'")}')">${allMonths.map(m=>`<option value="${m.month}"${m.month===cm?' selected':''}>${m.label||('فرز شهر '+m.month)}</option>`).join('')}</select></div><div id="myInfoShiftContent"></div>`}else{h+='<p style="color:#888;">لا توجد بيانات فروز.</p>'}h+='</div></div>';
h+=`<div class="collapsible-section"><button class="collapsible-btn open" onclick="toggleCollapsible(this)"><span><i class="fas fa-calendar-days"></i> المناوبات (${tot})</span><i class="fas fa-chevron-down"></i></button><div class="collapsible-content show">`;if(myo.length){h+=`<div class="capture-timestamp"><i class="fas fa-clock"></i> ${ts}</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:10px;"><div class="stat-card"><div class="stat-num">${tot}</div><div class="stat-lbl">إجمالي المناوبات</div></div>`;for(const[type,count]of Object.entries(tc).sort((a,b)=>b[1]-a[1]))h+=`<div class="stat-card"><div class="stat-num">${count}</div><div class="stat-lbl">${type}</div></div>`;h+='</div>';myo.forEach(o=>{const we=o.dayIdx===5||o.dayIdx===6;h+=`<div class="oncall-info-row"><div class="oc-header"><span class="oc-date${we?' weekend':''}">${we?'<span class="day-dot weekend"></span>':''}<i class="fas fa-calendar-day"></i> ${o.date} - ${o.day}</span><span class="oc-type">${o.cat}</span></div>`;if(o.colleagues.length){h+=`<div class="colleague-row"><span class="cl-label"><i class="fas fa-users"></i> الزملاء:</span><span class="cl-names">${o.colleagues.map((c,i)=>`${i>0?'<span class="cl-sep"> - </span>':''}${mcn(c.name,c.phone,c.abbr)}`).join('')}</span></div>`}h+='</div>'})}else h+='<p style="color:#888;">لا توجد مناوبات مسجلة هذا الشهر.</p>';h+='</div></div>';
h+=`<button class="download-btn" onclick="app.downloadMyInfoImage()"><i class="fas fa-camera btn-icon"></i><span class="btn-spinner"></span> تحميل معلوماتي كصورة</button></div>`;rd.innerHTML=h;rd.classList.add('show');document.getElementById('searchResultsList').innerHTML='';
setTimeout(()=>this.updateMyInfoShift(r.name,r.abbr),100)}
updateMyInfoShift(name,abbr){const cont=document.getElementById('myInfoShiftContent');if(!cont)return;const sel=document.getElementById('myInfoShiftMonth');if(!sel)return;const month=parseInt(sel.value);const h=this._resHeaders||[];const idx=this.getShiftColIndex(h,month);
if(idx<0||!this._resRaw||this._resRaw.length<2||this.isFutureShiftMonthAutoCopy(month)){cont.innerHTML='<p style="color:#888;">لا توجد بيانات لهذا الشهر.</p>';return}
const shiftVal=(this._resRaw.find(r=>r&&(r[1]||'').trim()===name)||[])[idx]||'';const shiftName=shiftVal.trim();
const members=[];for(let i=1;i<this._resRaw.length;i++){const r=this._resRaw[i];if(!r||!r[1])continue;const status=(r[11]||'').trim();if(!isJoined(status))continue;const sv=(r[idx]||'').trim();if(sv===shiftName&&sv&&sv!=='غير محدد'){const mname=(r[1]||'').trim();const mabbr=(r[2]||'').trim();const mphone=(r[4]||'').trim();if(!exactNameMatch(mabbr,abbr)&&!exactNameMatch(mname,name))members.push({name:mname,abbr:mabbr,phone:mphone})}}
let ht='';if(shiftName&&shiftName!=='غير محدد'){ht+=`<div class="shift-card-full" style="margin-bottom:10px;"><h3>${shiftName}</h3></div>`}else{ht+='<p style="color:#888;margin-bottom:10px;">لا يوجد فرز للشهر المحدد.</p>'}
if(members.length>0){ht+=`<div class="names-dropdown" style="margin-top:8px;"><button class="names-dropdown-btn"><span><i class="fas fa-users"></i> الزملاء في نفس الفرز (${members.length})</span><i class="fas fa-chevron-down"></i></button><ul class="names-dropdown-content">${members.map(m=>`<li>${mcn(m.name,m.phone,m.abbr)}</li>`).join('')}</ul></div>`}
cont.innerHTML=ht}
updateTime(){const el=document.getElementById('lastUpdateTime');if(el)el.textContent='آخر تحديث: '+new Date().toLocaleTimeString('ar-SA')}
}
let app;document.addEventListener('DOMContentLoaded',()=>{app=new HospitalApp();window.app=app});
</script></body></html>
